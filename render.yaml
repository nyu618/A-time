services:
  - type: web
    name: line-queue-system
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: line-queue-db
          property: connectionString
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: VITE_LIFF_ID
        sync: false

databases:
  - name: line-queue-db
    databaseName: queue_db
    user: queue_user
    plan: free
